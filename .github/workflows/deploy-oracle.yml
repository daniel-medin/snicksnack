name: Deploy to Oracle VM

on:
  push:
    branches:
      - master
      - main
    paths:
      - "**"
      - ".github/workflows/deploy-oracle.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ORACLE_HOST: ${{ vars.ORACLE_HOST != '' && vars.ORACLE_HOST || '82.70.47.203' }}
      ORACLE_SSH_USER: ${{ vars.ORACLE_SSH_USER != '' && vars.ORACLE_SSH_USER || 'ubuntu' }}
      SNICKSNACK_REMOTE_APP_DIR: ${{ vars.SNICKSNACK_REMOTE_APP_DIR != '' && vars.SNICKSNACK_REMOTE_APP_DIR || '/opt/stacks/snicksnack' }}
      SNICKSNACK_PUBLIC_URL: ${{ vars.SNICKSNACK_PUBLIC_URL != '' && vars.SNICKSNACK_PUBLIC_URL || 'https://snicksnack.mrcheng.se/' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Write SSH key
        shell: bash
        run: |
          test -n "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/oracle.key
          chmod 600 ~/.ssh/oracle.key
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: pwsh
        run: |
          ./deploy/oracle/deploy-oracle.ps1 `
            -HostName "$env:ORACLE_HOST" `
            -UserName "$env:ORACLE_SSH_USER" `
            -KeyPath "$HOME/.ssh/oracle.key" `
            -RemoteAppDir "$env:SNICKSNACK_REMOTE_APP_DIR" `
            -PublicUrl "$env:SNICKSNACK_PUBLIC_URL"
